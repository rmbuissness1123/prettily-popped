<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prettily Popped — Balloon Decor & Event Styling</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="data.js"></script>
<style>
  html, body { margin: 0; background: var(--surface-page); }
  #app { min-height: 100vh; }
</style>
</head>
<body>
<div id="app"></div>

<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel" src="Home.jsx"></script>
<script type="text/babel" src="Services.jsx"></script>
<script type="text/babel" src="Gallery.jsx"></script>
<script type="text/babel" src="About.jsx"></script>
<script type="text/babel" src="Contact.jsx"></script>

<script type="text/babel" data-presets="react">
  function App() {
    const [page, setPage] = React.useState('Home');
    const appRef = React.useRef(null);
    const onNav = (p) => { setPage(p); window.scrollTo({ top: 0, behavior: 'smooth' }); };

    const screens = {
      Home: window.PPHome, Services: window.PPServices, Gallery: window.PPGallery,
      About: window.PPAbout, Contact: window.PPContact,
    };
    const Screen = screens[page] || window.PPHome;

    return (
      <div ref={appRef}>
        <window.PPNav current={page} onNav={onNav} />
        <main><Screen onNav={onNav} /></main>
        <window.PPFooter onNav={onNav} />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
