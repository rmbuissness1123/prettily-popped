<!-- @dsCard group="Type" viewport="700x230" name="Type Scale" subtitle="From hero display down to caption" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px 26px; background: var(--surface-card); }
  .r { display: flex; align-items: baseline; gap: 16px; padding: 3px 0;
       border-bottom: 1px solid var(--border-soft); }
  .r:last-child { border-bottom: 0; }
  .tok { font-family: var(--font-body); font-size: 10.5px; color: var(--text-muted);
         width: 96px; flex: none; letter-spacing: .03em; }
  .demo { font-family: var(--font-display); color: var(--text-strong); line-height: 1.1;
          white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
</style>
</head>
<body>
  <div class="r"><span class="tok">3xl · 48px</span><span class="demo" style="font-size:42px">Make it pop</span></div>
  <div class="r"><span class="tok">2xl · 36px</span><span class="demo" style="font-size:32px">Organic garlands</span></div>
  <div class="r"><span class="tok">xl · 28px</span><span class="demo" style="font-size:26px">Centrepieces & columns</span></div>
  <div class="r"><span class="tok">lg · 22px</span><span class="demo" style="font-size:21px">Delivery & installation included</span></div>
  <div class="r"><span class="tok">base · 16px</span><span class="demo" style="font-size:16px;font-family:var(--font-body);color:var(--text-body)">Body copy in Hanken Grotesk, set comfortably.</span></div>
  <div class="r"><span class="tok">2xs · 11px</span><span class="demo" style="font-size:11px;font-family:var(--font-body);text-transform:uppercase;letter-spacing:.18em;color:var(--primary);font-weight:700">Eyebrow label</span></div>
</body>
</html>
