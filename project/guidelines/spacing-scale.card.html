<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="4px base grid — space-1 through space-10" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 26px; background: var(--surface-card);
         display: flex; align-items: flex-end; gap: 14px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--rose-300); border-radius: var(--radius-xs); width: 26px; }
  .lab { font-size: 10px; color: var(--text-muted); font-weight: 600; }
  .px { font-size: 9.5px; color: var(--primary); font-weight: 700; }
</style>
</head>
<body>
  <div class="col"><div class="bar" style="height:4px"></div><span class="lab">1</span><span class="px">4</span></div>
  <div class="col"><div class="bar" style="height:8px"></div><span class="lab">2</span><span class="px">8</span></div>
  <div class="col"><div class="bar" style="height:12px"></div><span class="lab">3</span><span class="px">12</span></div>
  <div class="col"><div class="bar" style="height:16px"></div><span class="lab">4</span><span class="px">16</span></div>
  <div class="col"><div class="bar" style="height:24px"></div><span class="lab">5</span><span class="px">24</span></div>
  <div class="col"><div class="bar" style="height:32px"></div><span class="lab">6</span><span class="px">32</span></div>
  <div class="col"><div class="bar" style="height:40px"></div><span class="lab">7</span><span class="px">40</span></div>
  <div class="col"><div class="bar" style="height:48px"></div><span class="lab">8</span><span class="px">48</span></div>
  <div class="col"><div class="bar" style="height:64px"></div><span class="lab">9</span><span class="px">64</span></div>
  <div class="col"><div class="bar" style="height:80px"></div><span class="lab">10</span><span class="px">80</span></div>
</body>
</html>
