<!-- @dsCard group="Type" viewport="700x190" name="Body — Hanken Grotesk" subtitle="Warm, friendly sans for all running text & UI" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 26px; background: var(--surface-card); font-family: var(--font-body); }
  .lead { font-size: 17px; color: var(--text-body); line-height: 1.55; margin: 0 0 8px; max-width: 580px; }
  .lead b { color: var(--text-strong); }
  .small { font-size: 13px; color: var(--text-muted); margin: 0 0 14px; }
  .meta { display: flex; gap: 16px; font-size: 11px; color: var(--text-muted);
          letter-spacing: .04em; text-transform: uppercase; font-weight: 600; }
  .meta b { color: var(--primary); font-weight: 700; }
</style>
</head>
<body>
  <p class="lead">I take such pride in my work and simply <b>love seeing a vision come to life</b> by my own two hands — big or small.</p>
  <p class="small">Regular · Medium · Semibold · Bold — set at 1.5–1.65 line height for comfortable reading.</p>
  <div class="meta">
    <span>Hanken Grotesk</span>
    <span>weights <b>400–700</b></span>
    <span>body · labels · buttons</span>
  </div>
</body>
</html>
