<!-- @dsCard group="Type" viewport="700x180" name="Display — Bodoni Moda" subtitle="Elegant high-contrast serif for headlines & the wordmark" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 26px; background: var(--surface-card); }
  .big { font-family: var(--font-display); color: var(--text-strong);
         font-size: 56px; line-height: 1; letter-spacing: -0.02em; font-weight: 600; margin: 0; }
  .meta { display: flex; gap: 18px; margin-top: 14px; font-size: 11px; color: var(--text-muted);
          letter-spacing: .04em; text-transform: uppercase; font-weight: 600; }
  .meta b { color: var(--primary); font-weight: 700; }
</style>
</head>
<body>
  <p class="big">Let's make it <em style="font-style:italic;color:var(--primary)">POP</em></p>
  <div class="meta">
    <span>Bodoni Moda</span>
    <span><b>600</b> Semibold</span>
    <span>tracking <b>-2%</b></span>
    <span>headings · hero · wordmark</span>
  </div>
</body>
</html>
