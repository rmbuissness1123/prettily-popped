<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 26px; background: var(--surface-shell);
         display: flex; align-items: center; justify-content: space-around; gap: 18px; }
  .c { background: var(--white-warm); width: 120px; height: 84px; border-radius: var(--radius-md);
       display: flex; align-items: flex-end; justify-content: center; padding-bottom: 10px; }
  .c span { font-size: 10.5px; font-weight: 700; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="c" style="box-shadow:var(--shadow-sm)"><span>sm</span></div>
  <div class="c" style="box-shadow:var(--shadow-md)"><span>md</span></div>
  <div class="c" style="box-shadow:var(--shadow-lg)"><span>lg</span></div>
  <div class="c" style="box-shadow:var(--shadow-rose)"><span style="color:var(--primary)">rose lift</span></div>
</body>
</html>
