<!-- @dsCard group="Type" viewport="700x150" name="Script — Parisienne" subtitle="Signature accent — used sparingly for warmth, never body" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px 26px; background: var(--surface-card);
         display: flex; align-items: center; justify-content: space-between; gap: 24px; }
  .script { font-family: var(--font-script); color: var(--primary); font-size: 52px; line-height: 1; }
  .note { font-size: 12px; color: var(--text-muted); max-width: 240px; line-height: 1.5; }
  .note b { color: var(--text-strong); display: block; font-family: var(--font-body);
            text-transform: uppercase; letter-spacing: .1em; font-size: 10.5px; margin-bottom: 4px; }
</style>
</head>
<body>
  <span class="script">Thanks for being here</span>
  <p class="note"><b>Parisienne</b>Signature moments only — Erin's voice, thank-yous, sign-offs. Never headings or body.</p>
</body>
</html>
