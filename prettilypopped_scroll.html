:root {
  /* Rose — signature dusty rose */
  --rose-50:  #FBEDEA;
  --rose-100: #F7DCD9;
  --rose-200: #EFC5C5;
  --rose-300: #E4A6AB;
  --rose-400: #D98C97;
  --rose-500: #CC7585;
  --rose-600: #B85D70;
  --rose-700: #9A4458;

  /* Berry — deeper accent for emphasis & links */
  --berry-500: #A8425C;
  --berry-600: #8E3650;
  --berry-700: #74293F;

  /* Plum — warm near-black with a berry cast */
  --plum-900: #3A2230;
  --plum-800: #4A2C3C;
  --plum-700: #5C3A4A;
  --plum-600: #735060;

  /* Gold — celebratory metallic accent */
  --gold-100: #F6EAD0;
  --gold-300: #E6CB8E;
  --gold-400: #D9B45E;
  --gold-500: #C79A45;
  --gold-600: #A87E33;

  /* Warm neutrals */
  --cream:      #FBF4EF;
  --shell:      #F5E9E2;
  --white-warm: #FFFCFA;
  --sand-100:   #EFE3DC;
  --sand-200:   #E3D2C9;
  --mauve-grey: #8C737C;

  /* Soft balloon decorative hues */
  --balloon-blush:  #EFC5C5;
  --balloon-peach:  #F3CBA8;
  --balloon-gold:   #E6CB8E;
  --balloon-sage:   #AFC3AC;
  --balloon-powder: #B7D2DD;
  --balloon-lilac:  #C9B6D6;

  /* Functional */
  --success: #6E9A6A;
  --error:   #C0584F;
  --info:    #5E8AA6;

  /* Semantic aliases */
  --surface-page:  var(--cream);
  --surface-card:  var(--white-warm);
  --surface-soft:  var(--rose-50);
  --surface-shell: var(--shell);
  --surface-ink:   var(--plum-900);

  --text-strong:     var(--plum-900);
  --text-body:       var(--plum-700);
  --text-muted:      var(--mauve-grey);
  --text-on-primary: #FFFFFF;
  --text-on-ink:     #F7E7E2;

  --primary:       var(--rose-500);
  --primary-hover: var(--rose-600);
  --primary-press: var(--rose-700);
  --primary-soft:  var(--rose-100);

  --accent:      var(--gold-500);
  --accent-soft: var(--gold-100);

  --link:       var(--berry-600);
  --link-hover: var(--berry-700);

  --border-soft:   #ECDAD3;
  --border-strong: #DCC4BB;
  --ring: color-mix(in oklch, var(--rose-500) 45%, transparent);
}

:root {
  --font-display: 'Bodoni Moda', 'Didot', Georgia, serif;
  --font-body:    'Hanken Grotesk', system-ui, -apple-system, 'Segoe UI', sans-serif;
  --font-script:  'Parisienne', 'Snell Roundhand', cursive;

  --text-2xs: 0.6875rem;
  --text-xs:  0.75rem;
  --text-sm:  0.875rem;
  --text-base: 1rem;
  --text-md:  1.125rem;
  --text-lg:  1.375rem;
  --text-xl:  1.75rem;
  --text-2xl: 2.25rem;
  --text-3xl: 3rem;
  --text-4xl: 4rem;
  --text-5xl: 5.25rem;

  --weight-regular: 400;
  --weight-medium:  500;
  --weight-semibold: 600;
  --weight-bold:    700;

  --leading-tight:   1.05;
  --leading-snug:    1.2;
  --leading-normal:  1.5;
  --leading-relaxed: 1.65;

  --tracking-tight:   -0.02em;
  --tracking-normal:  0;
  --tracking-wide:    0.04em;
  --tracking-eyebrow: 0.18em;

  --display-font:    var(--font-display);
  --display-weight:  var(--weight-semibold);
  --heading-font:    var(--font-display);
  --body-font:       var(--font-body);
  --eyebrow-tracking: var(--tracking-eyebrow);
}

:root {
  --space-0:  0;
  --space-1:  0.25rem;
  --space-2:  0.5rem;
  --space-3:  0.75rem;
  --space-4:  1rem;
  --space-5:  1.5rem;
  --space-6:  2rem;
  --space-7:  2.5rem;
  --space-8:  3rem;
  --space-9:  4rem;
  --space-10: 5rem;
  --space-12: 7rem;

  --container-max:    1200px;
  --container-narrow: 760px;
  --gutter:           var(--space-5);
  --section-y:        var(--space-10);
}

:root {
  --radius-xs:     6px;
  --radius-sm:     10px;
  --radius-md:     16px;
  --radius-lg:     24px;
  --radius-xl:     32px;
  --radius-pill:   999px;
  --radius-circle: 50%;

  --shadow-xs:    0 1px 2px rgba(58, 34, 48, 0.06);
  --shadow-sm:    0 2px 8px rgba(58, 34, 48, 0.07);
  --shadow-md:    0 8px 24px rgba(58, 34, 48, 0.10);
  --shadow-lg:    0 18px 48px rgba(58, 34, 48, 0.14);
  --shadow-rose:  0 12px 30px rgba(184, 93, 112, 0.28);
  --shadow-inset: inset 0 1px 0 rgba(255, 255, 255, 0.6);

  --ease-soft:    cubic-bezier(0.22, 1, 0.36, 1);
  --ease-buoyant: cubic-bezier(0.34, 1.56, 0.64, 1);
  --dur-fast: 140ms;
  --dur-base: 240ms;
  --dur-slow: 420ms;

  --border-width: 1.5px;
}

*, *::before, *::after { box-sizing: border-box; }

html { -webkit-text-size-adjust: 100%; }

body {
  margin: 0;
  font-family: var(--body-font);
  font-size: var(--text-base);
  line-height: var(--leading-relaxed);
  color: var(--text-body);
  background: var(--surface-page);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

h1, h2, h3, h4, h5 {
  font-family: var(--heading-font);
  color: var(--text-strong);
  font-weight: var(--weight-semibold);
  line-height: var(--leading-snug);
  margin: 0 0 0.5em;
  letter-spacing: var(--tracking-tight);
}

p { margin: 0 0 1em; text-wrap: pretty; }

a { color: var(--link); text-decoration: none; }
a:hover { color: var(--link-hover); }

strong, b { font-weight: var(--weight-bold); color: var(--text-strong); }

::selection { background: var(--rose-200); color: var(--plum-900); }

/* ── Layout helpers ──────────────────────────────────────────── */
.container {
  max-width: var(--container-max);
  margin-inline: auto;
  padding-inline: 28px;
}
.container--narrow {
  max-width: var(--container-narrow);
  margin-inline: auto;
  padding-inline: 28px;
}

/* ── Button ──────────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-2);
  font-family: var(--font-body);
  font-weight: var(--weight-semibold);
  letter-spacing: 0.01em;
  border-radius: var(--radius-pill);
  border: var(--border-width) solid transparent;
  cursor: pointer;
  text-decoration: none;
  white-space: nowrap;
  -webkit-font-smoothing: antialiased;
  transition:
    transform var(--dur-fast) var(--ease-buoyant),
    box-shadow var(--dur-base) var(--ease-soft),
    background var(--dur-base) var(--ease-soft),
    color var(--dur-base) var(--ease-soft),
    border-color var(--dur-base) var(--ease-soft);
}
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.btn--sm { font-size: 13px; padding: 8px 16px; }
.btn--md { font-size: 15px; padding: 12px 24px; }
.btn--lg { font-size: 17px; padding: 15px 32px; }
.btn--full { width: 100%; }

.btn--primary {
  background: var(--primary);
  color: var(--text-on-primary);
  box-shadow: var(--shadow-rose);
}
.btn--primary:hover:not(:disabled) {
  background: var(--primary-hover);
  transform: translateY(-2px);
}
.btn--primary:active:not(:disabled) {
  background: var(--primary-press);
  transform: translateY(0);
  box-shadow: none;
}

.btn--secondary {
  background: var(--white-warm);
  color: var(--berry-600);
  border-color: var(--border-strong);
  box-shadow: var(--shadow-xs);
}
.btn--secondary:hover:not(:disabled) {
  background: var(--rose-50);
  transform: translateY(-2px);
}

.btn--gold {
  background: var(--gold-500);
  color: #fff;
  box-shadow: 0 12px 30px rgba(168, 126, 51, 0.28);
}
.btn--gold:hover:not(:disabled) {
  background: var(--gold-600);
  transform: translateY(-2px);
}

.btn--ghost {
  background: transparent;
  color: var(--berry-600);
}
.btn--ghost:hover:not(:disabled) {
  background: var(--rose-50);
  transform: translateY(-2px);
}

/* ── Tag ─────────────────────────────────────────────────────── */
.tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-body);
  font-weight: var(--weight-semibold);
  letter-spacing: 0.02em;
  border-radius: var(--radius-pill);
  line-height: 1.2;
  font-size: 12.5px;
  padding: 5px 13px;
  white-space: nowrap;
}
.tag--sm { font-size: 11px; padding: 3px 10px; }

.tag--rose   { background: var(--rose-100);  color: var(--berry-700); }
.tag--gold   { background: var(--gold-100);  color: var(--gold-600);  }
.tag--sage   { background: #E1EADF;          color: #4F6B4C;          }
.tag--powder { background: #E2EEF3;          color: #3E677A;          }
.tag--lilac  { background: #EEE6F2;          color: #6A4F7C;          }
.tag--plum   { background: var(--shell);     color: var(--plum-800);  }

.tag--rose.tag--solid   { background: var(--rose-500);       color: #fff; }
.tag--gold.tag--solid   { background: var(--gold-500);       color: #fff; }
.tag--sage.tag--solid   { background: var(--balloon-sage);   color: #fff; }
.tag--powder.tag--solid { background: var(--balloon-powder); color: #fff; }
.tag--lilac.tag--solid  { background: var(--balloon-lilac);  color: #fff; }
.tag--plum.tag--solid   { background: var(--plum-800);       color: #fff; }

/* ── Card ────────────────────────────────────────────────────── */
.card {
  background: var(--surface-card);
  border: var(--border-width) solid var(--border-soft);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  transition:
    transform var(--dur-base) var(--ease-soft),
    box-shadow var(--dur-base) var(--ease-soft);
}
.card--pad-sm  { padding: var(--space-4); }
.card--pad-md  { padding: var(--space-5); }
.card--pad-lg  { padding: var(--space-7); }

.card--interactive:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
}
.card--soft  { background: var(--surface-soft);  border-color: var(--rose-100); }
.card--shell { background: var(--surface-shell); border-color: transparent; }

/* ── Form fields ─────────────────────────────────────────────── */
.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
  width: 100%;
}
.field__label {
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: var(--weight-semibold);
  color: var(--text-strong);
  letter-spacing: 0.01em;
  padding-left: 4px;
}
.field__input {
  font-family: var(--font-body);
  font-size: 15px;
  color: var(--text-strong);
  width: 100%;
  padding: 12px 18px;
  background: var(--white-warm);
  border: var(--border-width) solid var(--border-strong);
  border-radius: var(--radius-pill);
  outline: none;
  transition:
    border-color var(--dur-base) var(--ease-soft),
    box-shadow var(--dur-base) var(--ease-soft);
}
.field__input::placeholder { color: var(--mauve-grey); }
.field__input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 4px var(--ring);
}
.field__input--textarea {
  border-radius: var(--radius-md);
  resize: vertical;
  min-height: 96px;
  padding: 12px 16px;
}
.field__helper { font-size: 12px; padding-left: 4px; color: var(--text-muted); }
.field__error  { font-size: 12px; padding-left: 4px; color: var(--error); }

/* ── Service card ────────────────────────────────────────────── */
.service-card {
  background: var(--surface-card);
  border: var(--border-width) solid var(--border-soft);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  display: flex;
  flex-direction: column;
  transition:
    transform var(--dur-base) var(--ease-soft),
    box-shadow var(--dur-base) var(--ease-soft);
}
.service-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
}
.service-card__image {
  position: relative;
  aspect-ratio: 4 / 3;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.service-card__image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.service-card__placeholder {
  font-family: var(--font-script);
  font-size: 30px;
  color: rgba(58, 34, 48, 0.32);
  text-align: center;
  pointer-events: none;
}
.service-card__badge {
  position: absolute;
  top: 12px;
  left: 12px;
}
.service-card__body {
  padding: var(--space-5);
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex: 1;
}
.service-card__title {
  font-family: var(--font-display);
  font-size: 21px;
  font-weight: var(--weight-semibold);
  color: var(--text-strong);
  margin: 0;
  letter-spacing: -0.01em;
}
.service-card__blurb {
  font-size: 14px;
  color: var(--text-body);
  line-height: 1.5;
  flex: 1;
  margin: 0;
}
.service-card__footer {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-top: 4px;
  padding-top: 12px;
  border-top: 1px solid var(--border-soft);
}
.service-card__price {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: var(--weight-semibold);
  color: var(--berry-600);
}
.service-card__unit {
  font-size: 12px;
  color: var(--text-muted);
  margin-left: 4px;
}
.service-card__cta {
  font-family: var(--font-body);
  font-weight: var(--weight-semibold);
  font-size: 13px;
  color: var(--berry-600);
  background: transparent;
  border: none;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 0;
  transition: gap var(--dur-fast) var(--ease-soft);
}
.service-card:hover .service-card__cta { gap: 9px; }

/* ── Section heading ─────────────────────────────────────────── */
.section-heading {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.section-heading--center {
  align-items: center;
  text-align: center;
  max-width: 640px;
  margin-inline: auto;
}
.section-heading__eyebrow {
  font-family: var(--font-body);
  text-transform: uppercase;
  letter-spacing: var(--tracking-eyebrow);
  font-size: 11px;
  font-weight: var(--weight-bold);
  color: var(--primary);
}
.section-heading__eyebrow--dark { color: var(--gold-400); }

.section-heading__title {
  font-family: var(--font-display);
  font-weight: var(--weight-semibold);
  font-size: clamp(28px, 4vw, 44px);
  line-height: 1.08;
  letter-spacing: -0.02em;
  color: var(--text-strong);
  margin: 0;
}
.section-heading__title--dark { color: var(--text-on-ink); }

.section-heading__script {
  font-family: var(--font-script);
  font-weight: 400;
  color: var(--primary);
  font-size: 0.78em;
  margin-left: 0.2em;
  letter-spacing: 0;
}
.section-heading__script--dark { color: var(--gold-400); }

.section-heading__lead {
  font-family: var(--font-body);
  font-size: 17px;
  line-height: 1.6;
  margin: 4px 0 0;
  color: var(--text-body);
  max-width: 52ch;
}
.section-heading__lead--dark { color: var(--text-on-ink); opacity: 0.85; }

/* ── Balloon dots ────────────────────────────────────────────── */
.balloon-dots {
  display: inline-flex;
  gap: 3px;
  align-items: center;
}
.balloon-dot {
  width: 11px;
  height: 14px;
  border-radius: 50% 50% 50% 50% / 46% 46% 54% 54%;
  display: inline-block;
}

/* ── Site nav ────────────────────────────────────────────────── */
.site-nav {
  position: sticky;
  top: 0;
  z-index: 20;
  background: rgba(251, 244, 239, 0.82);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: var(--border-width) solid var(--border-soft);
}
.site-nav__inner {
  max-width: var(--container-max);
  margin-inline: auto;
  padding: 14px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
}
.site-nav__logo {
  display: flex;
  align-items: center;
  gap: 10px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  text-decoration: none;
}
.site-nav__wordmark {
  font-family: var(--font-display);
  font-weight: var(--weight-semibold);
  font-size: 30px;
  color: var(--plum-900);
  letter-spacing: -0.01em;
}
.site-nav__wordmark em {
  font-style: italic;
  color: var(--primary);
}
.site-nav__links {
  display: flex;
  align-items: center;
  gap: 6px;
}
.site-nav__link {
  font-family: var(--font-body);
  font-size: 14.5px;
  font-weight: var(--weight-semibold);
  color: var(--text-body);
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 8px 14px;
  border-radius: var(--radius-pill);
  transition:
    background var(--dur-base) var(--ease-soft),
    color var(--dur-base) var(--ease-soft);
}
.site-nav__link:hover,
.site-nav__link.is-active {
  background: var(--rose-50);
  color: var(--berry-600);
}
.site-nav__cta { margin-left: 8px; }

/* ── Site footer ─────────────────────────────────────────────── */
.site-footer {
  background: var(--surface-ink);
  color: var(--text-on-ink);
}
.site-footer__inner {
  max-width: var(--container-max);
  margin-inline: auto;
  padding: 56px 28px 32px;
  display: grid;
  grid-template-columns: 1.4fr 1fr 1fr;
  gap: 40px;
}
.site-footer__wordmark {
  font-family: var(--font-display);
  font-weight: var(--weight-semibold);
  font-size: 26px;
  color: #fff;
  margin: 0 0 10px;
}
.site-footer__wordmark em { font-style: italic; color: var(--rose-300); }
.site-footer__tagline {
  font-size: 14.5px;
  line-height: 1.6;
  max-width: 34ch;
  opacity: 0.82;
  margin: 0 0 14px;
}
.site-footer__sign {
  font-family: var(--font-script);
  font-size: 26px;
  color: var(--gold-400);
  display: block;
}
.site-footer__col-head {
  font-family: var(--font-body);
  text-transform: uppercase;
  letter-spacing: 0.14em;
  font-size: 11px;
  font-weight: var(--weight-bold);
  color: var(--gold-400);
  margin: 0 0 14px;
}
.site-footer__nav-link {
  display: block;
  background: none;
  border: none;
  cursor: pointer;
  padding: 5px 0;
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--text-on-ink);
  opacity: 0.82;
  text-align: left;
  transition: opacity var(--dur-base) var(--ease-soft);
}
.site-footer__nav-link:hover { opacity: 1; }
.site-footer__text {
  font-size: 14px;
  margin: 0 0 9px;
  opacity: 0.82;
  line-height: 1.5;
}
.site-footer__copy {
  border-top: 1px solid rgba(247, 231, 226, 0.14);
  padding: 18px 28px;
  text-align: center;
  font-size: 12.5px;
  opacity: 0.6;
  max-width: var(--container-max);
  margin-inline: auto;
}

/* ── Three-up grid ───────────────────────────────────────────── */
.grid-3 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 22px;
}
.grid-3--gap-lg { gap: 24px; }

/* ── Gallery grid ────────────────────────────────────────────── */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 180px;
  gap: 16px;
}
.gallery-tile {
  border-radius: var(--radius-lg);
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: box-shadow var(--dur-base) var(--ease-soft), transform var(--dur-base) var(--ease-soft);
}
.gallery-tile:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}
.gallery-tile__label {
  position: absolute;
  bottom: 14px;
  left: 14px;
}

/* ── Filter row ──────────────────────────────────────────────── */
.filter-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 32px;
}

/* ── Occasion tags ───────────────────────────────────────────── */
.occasion-tags {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.occasion-btn {
  cursor: pointer;
  border: none;
  background: none;
  padding: 0;
}

/* ── CTA band ────────────────────────────────────────────────── */
.cta-band {
  background: var(--surface-ink);
}
.cta-band__inner {
  max-width: var(--container-max);
  margin-inline: auto;
  padding: 64px 28px;
  text-align: center;
}

/* ── Values strip ────────────────────────────────────────────── */
.values-strip {
  background: var(--surface-shell);
}
.values-strip__inner {
  max-width: var(--container-max);
  margin-inline: auto;
  padding: 56px 28px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 32px;
}
.values-strip__title {
  font-family: var(--font-display);
  font-size: 22px;
  color: var(--text-strong);
  margin: 0 0 8px;
}
.values-strip__body {
  margin: 0;
  color: var(--text-body);
  font-size: 15px;
  line-height: 1.6;
}

/* ── Services upsell banner ──────────────────────────────────── */
.upsell-banner {
  margin-top: 48px;
  padding: 32px 36px;
  border-radius: var(--radius-lg);
  background: var(--surface-soft);
  border: var(--border-width) solid var(--rose-100);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  flex-wrap: wrap;
}
.upsell-banner__title {
  font-family: var(--font-display);
  font-size: 24px;
  color: var(--text-strong);
  margin: 0 0 6px;
}
.upsell-banner__body {
  margin: 0;
  color: var(--text-body);
  font-size: 15px;
}

/* ════════════════════════════════════════════════════════════════════════════
   Prettily Popped — scroll journey styles
   Layered on top of the design-token system + components.css.
   ════════════════════════════════════════════════════════════════════════════ */

/* ── Page frame ───────────────────────────────────────────────────────────── */

html { scroll-behavior: smooth; }
body { overflow-x: hidden; }

#main { position: relative; }

/* ── Top bar ──────────────────────────────────────────────────────────────── */

.topbar {
  position: fixed;
  inset: 0 0 auto 0;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 clamp(16px, 4vw, 32px);
  z-index: 50;
  background: color-mix(in srgb, var(--cream) 82%, transparent);
  -webkit-backdrop-filter: blur(10px);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border-soft);
}
.topbar__logo {
  font-family: var(--font-display);
  font-weight: var(--weight-semibold);
  font-size: 20px;
  letter-spacing: -0.01em;
  color: var(--plum-900);
  background: none;
  border: 0;
  cursor: pointer;
  padding: 0;
}
.topbar__logo em { font-style: italic; color: var(--primary); }

/* ── Scenes ───────────────────────────────────────────────────────────────── */

.scene {
  position: relative;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background: var(--scene-bg, var(--cream));
  padding: 80px 20px 40px;
}
.motion-mode .scene--hero,
.motion-mode .scene--occasion { height: 100vh; min-height: 100vh; }

.scene__panel {
  position: relative;
  width: min(1120px, 94vw);
  margin: auto;
  will-change: transform, opacity;
}

/* Balloon arch backdrop */
.scene__arch-wrap {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 0;
  pointer-events: none;
  will-change: transform, opacity;
}
.scene__arch {
  width: min(760px, 88vw);
  animation: pp-float 7s ease-in-out infinite;
}
.scene__arch svg { width: 100%; height: auto; display: block; filter: drop-shadow(0 14px 30px rgba(58, 34, 48, 0.12)); }
.scene__arch-wrap--hero .scene__arch { width: min(880px, 94vw); }

.no-float .scene__arch { animation: none !important; }

@keyframes pp-float {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-14px); }
}

/* Scene content */
.scene__content {
  position: relative;
  z-index: 1;
  max-width: 760px;
  margin-inline: auto;
  text-align: center;
  will-change: transform, opacity;
}
.scene__index {
  font-family: var(--font-body);
  text-transform: uppercase;
  letter-spacing: var(--tracking-eyebrow);
  font-size: var(--text-2xs);
  font-weight: var(--weight-bold);
  color: var(--scene-accent, var(--primary));
  margin: 0 0 6px;
}
.scene__script {
  display: block;
  font-family: var(--font-script);
  font-size: clamp(26px, 4vw, 38px);
  color: var(--scene-accent, var(--primary));
  line-height: 1;
}
.scene__title {
  font-family: var(--font-display);
  font-weight: var(--weight-semibold);
  font-size: clamp(44px, 8vw, 92px);
  line-height: 1;
  letter-spacing: -0.025em;
  color: var(--plum-900);
  margin: 6px 0 14px;
}
.scene__vibe {
  font-size: clamp(16px, 2.1vw, 19px);
  line-height: 1.6;
  color: var(--text-body);
  max-width: 54ch;
  margin: 0 auto 8px;
}

/* ── Tents (package cards) ────────────────────────────────────────────────── */

.tent-row {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
  margin: 28px 0 26px;
}
.tent { width: 232px; max-width: 78vw; text-align: left; }

.tent__awning {
  --sc: 11px;
  height: 30px;
  border-radius: 9px 9px 0 0;
  background: repeating-linear-gradient(
    90deg,
    var(--tent-accent, var(--primary)) 0 22px,
    var(--white-warm) 22px 44px
  );
  -webkit-mask:
    linear-gradient(#000, #000) top / 100% calc(100% - var(--sc)) no-repeat,
    radial-gradient(var(--sc) at 50% 100%, #0000 98%, #000) bottom / calc(2 * var(--sc)) var(--sc) repeat-x;
  mask:
    linear-gradient(#000, #000) top / 100% calc(100% - var(--sc)) no-repeat,
    radial-gradient(var(--sc) at 50% 100%, #0000 98%, #000) bottom / calc(2 * var(--sc)) var(--sc) repeat-x;
}
.tent__body {
  background: var(--white-warm);
  border: var(--border-width) solid var(--border-soft);
  border-top: none;
  border-radius: 0 0 var(--radius-md) var(--radius-md);
  padding: 16px 18px 16px;
  box-shadow: var(--shadow-md);
  position: relative;
}
.tent__badge {
  display: inline-block;
  font-family: var(--font-body);
  font-size: var(--text-2xs);
  font-weight: var(--weight-bold);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #fff;
  background: var(--tent-accent, var(--primary));
  border-radius: var(--radius-pill);
  padding: 3px 9px;
  margin-bottom: 8px;
}
.tent__name {
  font-family: var(--font-display);
  font-size: 18px;
  color: var(--text-strong);
  margin: 0 0 6px;
  line-height: 1.2;
}
.tent__blurb {
  font-size: 13.5px;
  line-height: 1.5;
  color: var(--text-body);
  margin: 0 0 12px;
}
.tent__foot { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.tent__price {
  font-family: var(--font-display);
  font-weight: var(--weight-semibold);
  font-size: 20px;
  color: var(--tent-accent, var(--primary));
}
.tent__cta {
  background: none;
  border: 0;
  cursor: pointer;
  font-family: var(--font-body);
  font-weight: var(--weight-semibold);
  font-size: 13px;
  color: var(--link);
  padding: 4px 0;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.tent__cta:hover { color: var(--link-hover); }
.tent__cta span { transition: transform var(--dur-fast) var(--ease-soft); }
.tent__cta:hover span { transform: translateX(3px); }

/* ── How it works ─────────────────────────────────────────────────────────── */

.scene--steps { background: var(--surface-shell); }
.steps-head { text-align: center; margin-bottom: 40px; }
.steps-head__title {
  font-family: var(--font-display);
  font-weight: var(--weight-semibold);
  font-size: clamp(28px, 4vw, 44px);
  letter-spacing: -0.02em;
  color: var(--plum-900);
  margin: 8px 0 0;
}
.steps-head__script {
  font-family: var(--font-script);
  color: var(--primary);
  display: inline-block;
  margin-left: 6px;
  letter-spacing: 0;
}
.steps-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
  max-width: 1000px;
  margin: 0 auto;
}
.step-card {
  background: var(--white-warm);
  border: var(--border-width) solid var(--border-soft);
  border-radius: var(--radius-lg);
  padding: 28px;
  box-shadow: var(--shadow-sm);
}
.step-card__num {
  font-family: var(--font-display);
  font-size: 40px;
  font-weight: var(--weight-semibold);
  color: var(--rose-300);
  display: block;
}
.step-card__title {
  font-family: var(--font-display);
  font-size: 22px;
  color: var(--text-strong);
  margin: 8px 0 6px;
}
.step-card__body { font-size: 15px; color: var(--text-body); margin: 0; line-height: 1.55; }

/* ── Booking finale ───────────────────────────────────────────────────────── */

.scene--booking {
  flex-direction: column;
  justify-content: flex-start;
  background: linear-gradient(180deg, var(--rose-50) 0%, var(--cream) 60%);
  padding-top: 96px;
}
.booking {
  display: grid;
  grid-template-columns: 1fr 1.05fr;
  gap: 44px;
  width: min(980px, 92vw);
  margin: 0 auto 64px;
  align-items: start;
}
.booking__title {
  font-family: var(--font-display);
  font-weight: var(--weight-semibold);
  font-size: clamp(34px, 5vw, 52px);
  letter-spacing: -0.02em;
  color: var(--plum-900);
  margin: 6px 0 0;
}
.booking__script { font-family: var(--font-script); color: var(--primary); margin-left: 6px; }
.booking__lead { font-size: 17px; line-height: 1.65; color: var(--text-body); margin: 16px 0 26px; }
.booking__info { display: flex; flex-direction: column; gap: 14px; }
.booking__info-row { display: flex; gap: 14px; align-items: baseline; }
.booking__info-key {
  font-family: var(--font-body);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-size: 11px;
  font-weight: var(--weight-bold);
  color: var(--primary);
  width: 64px;
  flex: none;
}
.booking__info-val { font-size: 15.5px; color: var(--text-strong); }

.booking__card { box-shadow: var(--shadow-md); }
.booking__form { display: flex; flex-direction: column; gap: 16px; }
.booking__row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.booking__occasion-label { display: block; margin-bottom: 8px; }
.booking__sent { text-align: center; padding: 28px 8px; }
.booking__sent-title { font-family: var(--font-script); font-size: 40px; color: var(--primary); margin-bottom: 10px; }
.booking__sent-body { font-size: 16px; color: var(--text-body); margin: 0 0 22px; }

/* ── Progress rail ────────────────────────────────────────────────────────── */

.rail {
  position: fixed;
  right: 18px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 15px;
  z-index: 40;
}
.rail__dot {
  width: 12px;
  height: 12px;
  padding: 0;
  border-radius: 50%;
  border: 1.5px solid var(--border-strong);
  background: transparent;
  cursor: pointer;
  position: relative;
  transition: transform var(--dur-base) var(--ease-buoyant), background var(--dur-base), border-color var(--dur-base);
}
.rail__dot:hover { border-color: var(--primary); }
.rail__dot.is-active { background: var(--primary); border-color: var(--primary); transform: scale(1.35); }
.rail__label {
  position: absolute;
  right: 22px;
  top: 50%;
  transform: translateY(-50%);
  white-space: nowrap;
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: var(--weight-semibold);
  color: var(--plum-900);
  background: var(--white-warm);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-pill);
  padding: 4px 10px;
  box-shadow: var(--shadow-sm);
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--dur-base) var(--ease-soft);
}
.rail__dot:hover .rail__label { opacity: 1; }

/* ── Hero ─────────────────────────────────────────────────────────────────── */

.scene--hero { background: linear-gradient(180deg, var(--rose-50) 0%, var(--cream) 78%); }
.hero__content { position: relative; z-index: 1; text-align: center; max-width: 760px; }
.hero__script { display: block; font-family: var(--font-script); font-size: clamp(28px, 4.5vw, 42px); color: var(--primary); }
.hero__title {
  font-family: var(--font-display);
  font-weight: var(--weight-semibold);
  font-size: clamp(56px, 12vw, 150px);
  line-height: 0.95;
  letter-spacing: -0.03em;
  color: var(--plum-900);
  margin: 4px 0 18px;
}
.hero__title em { font-style: italic; color: var(--primary); }
.hero__tag { font-size: clamp(16px, 2.2vw, 20px); line-height: 1.6; color: var(--text-body); max-width: 48ch; margin: 0 auto 28px; }
.hero__cta-row { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
.hero__hint {
  display: block;
  margin-top: 40px;
  font-family: var(--font-body);
  text-transform: uppercase;
  letter-spacing: 0.3em;
  font-size: 11px;
  font-weight: var(--weight-bold);
  color: var(--mauve-grey);
  animation: pp-bob 1.8s ease-in-out infinite;
}
@keyframes pp-bob { 0%, 100% { transform: translateY(0); opacity: 0.6; } 50% { transform: translateY(8px); opacity: 1; } }
.no-float .hero__hint { animation: none; }

/* ── Confetti ─────────────────────────────────────────────────────────────── */

.confetti-field { position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 2; }
.confetti {
  position: absolute;
  top: -8%;
  width: 9px;
  height: 14px;
  border-radius: 2px;
  opacity: 0;
  animation-name: pp-confetti;
  animation-timing-function: ease-in;
  animation-iteration-count: 1;
  animation-fill-mode: forwards;
  animation-play-state: paused;
}
.scene--booking.is-popped .confetti { animation-play-state: running; }
@keyframes pp-confetti {
  0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(96vh) rotate(var(--rot, 360deg)); opacity: 0; }
}
.no-float .confetti { animation: none !important; opacity: 0 !important; }

/* ── Static / fallback mode ───────────────────────────────────────────────── */

.static-mode .scene { height: auto; min-height: auto; padding-block: 76px; }
.static-mode .scene--hero { min-height: 90vh; }
.static-mode .scene--occasion .scene__arch { width: min(560px, 74vw); opacity: 0.55; }
.static-mode .reveal { opacity: 0; transform: translateY(40px); transition: opacity 0.7s var(--ease-soft), transform 0.7s var(--ease-soft); }
.static-mode .reveal.in-view { opacity: 1; transform: none; }

/* ── Responsive ───────────────────────────────────────────────────────────── */

@media (max-width: 820px) {
  .rail { display: none; }
  .steps-row { grid-template-columns: 1fr; max-width: 460px; }
  .booking { grid-template-columns: 1fr; gap: 28px; }
  .booking__row2 { grid-template-columns: 1fr; }
  .scene { padding-block: 72px 40px; }
}

/* ── Reduced motion ───────────────────────────────────────────────────────── */

@media (prefers-reduced-motion: reduce) {
  html { scroll-behavior: auto; }
  .scene__arch, .hero__hint, .confetti { animation: none !important; }
}

</script>
  <script>
'use strict';

/* ════════════════════════════════════════════════════════════════════════════
   Prettily Popped — scroll journey
   A single-page, scroll-driven experience: visitors pass through a balloon arch
   into a series of pinned, swiping "occasion worlds," ending at a booking finale.
   Motion is layered on with GSAP/ScrollTrigger and degrades to a clean vertical
   page when GSAP is unavailable, on small/touch screens, or with reduced motion.
   ════════════════════════════════════════════════════════════════════════════ */

/* ── Data: services ───────────────────────────────────────────────────────── */

const SERVICES = {
  g6:     { name: '6 ft Organic Garland',        price: 'CA$65',  tag: 'Garlands',     blurb: 'A sweet, hand-built garland — perfect for a dessert table or backdrop.' },
  g10:    { name: '10 ft Organic Garland',       price: 'CA$120', tag: 'Garlands',     blurb: 'A lush, full garland in your colours — the showstopper of any space.', badge: 'Most popular' },
  g16:    { name: '16 ft Organic Garland',       price: 'CA$185', tag: 'Garlands',     blurb: 'Big, bold and beautiful — built to frame a whole feature wall.' },
  centre: { name: 'Balloon Stack / Centrepiece', price: 'CA$60',  tag: 'Centrepieces', blurb: 'A charming stacked centrepiece to make every table feel special.' },
  column: { name: 'Balloon Tower / Column',      price: 'CA$80',  tag: 'Columns',      blurb: 'A standing column to frame an entrance, stage, or photo corner.' },
  arch:   { name: 'Golden Arch — full fill',     price: 'CA$200', tag: 'Arches',       blurb: 'Our golden arch, fully filled — an unforgettable backdrop.', badge: 'Statement' },
};

/* ── Data: occasions (the spine of the journey) ───────────────────────────── */

const OCCASIONS = [
  {
    key: 'birthdays', name: 'Birthdays', script: 'make a wish',
    vibe: 'Bright, playful and full of joy — the kind of backdrop that begs for cake-and-candles photos.',
    scene: 'linear-gradient(180deg,#FBEDEA 0%,#FBF4EF 70%)', accent: '#CC7585',
    balloons: ['#EFC5C5', '#F3CBA8', '#E6CB8E', '#CC7585'],
    packages: ['g10', 'centre', 'column'],
  },
  {
    key: 'weddings', name: 'Weddings', script: 'happily ever after',
    vibe: 'Romantic, elegant and timeless — soft neutrals with a glint of gold for your most-photographed day.',
    scene: 'linear-gradient(180deg,#FBF4EF 0%,#F5E9E2 75%)', accent: '#A87E33',
    balloons: ['#FFFCFA', '#EFC5C5', '#E6CB8E', '#D9B45E'],
    packages: ['arch', 'g16', 'centre'],
  },
  {
    key: 'baby-showers', name: 'Baby showers', script: 'sweet little welcome',
    vibe: 'Soft, gentle pastels to welcome the newest tiny guest of honour.',
    scene: 'linear-gradient(180deg,#E2EEF3 0%,#FBF4EF 72%)', accent: '#5E8AA6',
    balloons: ['#B7D2DD', '#EFC5C5', '#AFC3AC', '#FFFCFA'],
    packages: ['g6', 'centre'],
  },
  {
    key: 'anniversaries', name: 'Anniversaries', script: 'still popping',
    vibe: 'Deeper, richer tones — rose and berry with gold — for milestones worth celebrating.',
    scene: 'linear-gradient(180deg,#F7DCD9 0%,#FBF4EF 72%)', accent: '#8E3650',
    balloons: ['#CC7585', '#A8425C', '#E6CB8E', '#9A4458'],
    packages: ['g10', 'arch'],
  },
  {
    key: 'corporate', name: 'Corporate', script: 'on brand, on point',
    vibe: 'Refined and understated — polished pieces that elevate the room without shouting.',
    scene: 'linear-gradient(180deg,#EFE3DC 0%,#FBF4EF 72%)', accent: '#5C3A4A',
    balloons: ['#E3D2C9', '#735060', '#E6CB8E', '#8C737C'],
    packages: ['g16', 'column', 'centre'],
  },
  {
    key: 'grand-openings', name: 'Grand openings', script: 'cut the ribbon',
    vibe: 'Big, bold and impossible to miss — gold and rose to pull every eye to your door.',
    scene: 'linear-gradient(180deg,#F6EAD0 0%,#FBF4EF 72%)', accent: '#A87E33',
    balloons: ['#E6CB8E', '#CC7585', '#F3CBA8', '#D9B45E'],
    packages: ['arch', 'g16', 'column'],
  },
];

const HERO_BALLOONS = ['#EFC5C5', '#E6CB8E', '#CC7585', '#F3CBA8', '#C9B6D6', '#B7D2DD'];

const STEPS = [
  { n: '01', t: 'Tell me your vision', d: "Share your date, colours, and the vibe you're dreaming of." },
  { n: '02', t: 'I design your pieces', d: 'I plan garlands, columns and centrepieces to match your space.' },
  { n: '03', t: 'Delivered & installed', d: 'I bring it to life on-site — you just enjoy the day.' },
];

const BIZ = {
  email: 'hello@prettilypopped.com',
  where: 'Fredericton &amp; surrounding areas',
  travel: 'A little further for a small mileage fee',
};

/* ── State ────────────────────────────────────────────────────────────────── */

const state = {
  contactSent: false,
  contactOccasion: 'Birthdays',
};

/* ── Small helpers ────────────────────────────────────────────────────────── */

function pad(n) { return String(n).padStart(2, '0'); }

function tag(label, tone, solid, size) {
  const cls = ['tag', `tag--${tone}`, solid ? 'tag--solid' : '', size ? `tag--${size}` : '']
    .filter(Boolean).join(' ');
  return `<span class="${cls}">${label}</span>`;
}

function fieldInput({ label, type, placeholder, id, required }) {
  const fid = id || label.toLowerCase().replace(/\s+/g, '-');
  return `<div class="field">
    ${label ? `<label class="field__label" for="${fid}">${label}</label>` : ''}
    <input class="field__input" id="${fid}" type="${type || 'text'}"
      placeholder="${placeholder || ''}" ${required ? 'required' : ''}>
  </div>`;
}

function fieldTextarea({ label, placeholder, id }) {
  const fid = id || label.toLowerCase().replace(/\s+/g, '-');
  return `<div class="field">
    ${label ? `<label class="field__label" for="${fid}">${label}</label>` : ''}
    <textarea class="field__input field__input--textarea" id="${fid}"
      placeholder="${placeholder || ''}"></textarea>
  </div>`;
}

/* ── Balloon-arch SVG (no image assets) ───────────────────────────────────── */

function balloonShape(x, y, r, color) {
  const rx = r * 0.86, ry = r;
  const body  = `<ellipse cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" rx="${rx.toFixed(1)}" ry="${ry.toFixed(1)}" fill="${color}"/>`;
  const shine = `<ellipse cx="${(x - rx * 0.32).toFixed(1)}" cy="${(y - ry * 0.34).toFixed(1)}" rx="${(rx * 0.26).toFixed(1)}" ry="${(ry * 0.34).toFixed(1)}" fill="#FFFFFF" opacity="0.34"/>`;
  const knot  = `<path d="M ${(x - 4).toFixed(1)} ${(y + ry - 2).toFixed(1)} L ${(x + 4).toFixed(1)} ${(y + ry - 2).toFixed(1)} L ${x.toFixed(1)} ${(y + ry + 6).toFixed(1)} Z" fill="${color}" opacity="0.92"/>`;
  return `<g>${body}${shine}${knot}</g>`;
}

function balloonArchSVG(colors) {
  const cx = 500, cy = 560, rx = 382, ry = 472, N = 22;
  let out = '';
  for (let i = 0; i < N; i++) {
    const f = i / (N - 1);
    const ang = Math.PI * (1 - f);           // PI (left) → 0 (right), arcing over the top
    const off = (i % 2 === 0) ? 1.0 : 0.86;  // alternate inner/outer for an organic double row
    const x = cx + Math.cos(ang) * rx * off;
    const y = cy - Math.sin(ang) * ry * off;
    const r = (i % 3 === 0) ? 34 : (i % 3 === 1) ? 27 : 31;
    out += balloonShape(x, y, r, colors[i % colors.length]);
  }
  return `<svg viewBox="0 0 1000 660" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">${out}</svg>`;
}

/* ── Tents (package cards) ────────────────────────────────────────────────── */

function tentHTML(serviceKey, occasion) {
  const s = SERVICES[serviceKey];
  return `<article class="tent" style="--tent-accent:${occasion.accent}">
    <div class="tent__awning"></div>
    <div class="tent__body">
      ${s.badge ? `<span class="tent__badge">${s.badge}</span>` : ''}
      <h3 class="tent__name">${s.name}</h3>
      <p class="tent__blurb">${s.blurb}</p>
      <div class="tent__foot">
        <span class="tent__price">${s.price}</span>
        <button class="tent__cta" data-plan="${occasion.name}">Plan this <span aria-hidden="true">&rarr;</span></button>
      </div>
    </div>
  </article>`;
}

/* ── Scenes ───────────────────────────────────────────────────────────────── */

function heroScene() {
  return `<section class="scene scene--hero" id="scene-hero" data-scene="hero">
    <div class="scene__arch-wrap scene__arch-wrap--hero" aria-hidden="true">
      <div class="scene__arch">${balloonArchSVG(HERO_BALLOONS)}</div>
    </div>
    <div class="hero__content">
      <span class="hero__script">hello &amp; welcome &mdash;</span>
      <h1 class="hero__title">Prettily <em>Popped</em></h1>
      <p class="hero__tag">Custom balloon decor &amp; event styling, handmade in Fredericton.
        Scroll to wander through an arch into every kind of celebration.</p>
      <div class="hero__cta-row">
        <button class="btn btn--primary btn--lg" data-scroll="scene-birthdays">Start the journey <span aria-hidden="true">&darr;</span></button>
        <button class="btn btn--secondary btn--lg" data-scroll="scene-booking">Book now</button>
      </div>
      <span class="hero__hint" aria-hidden="true">scroll</span>
    </div>
  </section>`;
}

function occasionScene(o, i) {
  const tents = o.packages.map(k => tentHTML(k, o)).join('');
  return `<section class="scene scene--occasion" id="scene-${o.key}" data-scene="occasion" data-index="${i}"
      style="--scene-bg:${o.scene};--scene-accent:${o.accent}">
    <div class="scene__panel">
      <div class="scene__arch-wrap" aria-hidden="true">
        <div class="scene__arch">${balloonArchSVG(o.balloons)}</div>
      </div>
      <div class="scene__content">
        <p class="scene__index">Occasion ${pad(i + 1)} / ${pad(OCCASIONS.length)}</p>
        <span class="scene__script">${o.script}</span>
        <h2 class="scene__title">${o.name}</h2>
        <p class="scene__vibe">${o.vibe}</p>
        <div class="tent-row">${tents}</div>
        <button class="btn btn--primary btn--lg scene__cta" data-plan="${o.name}">
          Plan my ${o.name.toLowerCase()} <span aria-hidden="true">&rarr;</span>
        </button>
      </div>
    </div>
  </section>`;
}

function howItWorksScene() {
  const steps = STEPS.map(s => `
    <div class="step-card reveal">
      <span class="step-card__num">${s.n}</span>
      <h3 class="step-card__title">${s.t}</h3>
      <p class="step-card__body">${s.d}</p>
    </div>`).join('');

  return `<section class="scene scene--steps" id="scene-steps" data-scene="steps">
    <div class="scene__panel">
      <div class="steps-head reveal">
        <span class="section-heading__eyebrow">How it works</span>
        <h2 class="steps-head__title">Three easy steps to a
          <span class="steps-head__script">popping party</span>
        </h2>
      </div>
      <div class="steps-row">${steps}</div>
    </div>
  </section>`;
}

function bookingFormHTML() {
  if (state.contactSent) {
    return `<div class="booking__sent">
      <div class="booking__sent-title">Yay &mdash; thank you!</div>
      <p class="booking__sent-body">Your request is on its way. I&rsquo;ll be in touch very soon to start planning your pieces!</p>
      <button class="btn btn--secondary btn--md" data-action="reset-contact">Send another</button>
    </div>`;
  }

  const occasionBtns = OCCASIONS.map(o => {
    const selected = o.name === state.contactOccasion;
    return `<button class="occasion-btn" type="button" data-occasion="${o.name}">
      ${tag(o.name, selected ? 'rose' : 'plum', selected)}
    </button>`;
  }).join('');

  return `<form id="contact-form" novalidate class="booking__form">
    <div class="booking__row2">
      ${fieldInput({ label: 'Your name', placeholder: 'Erin', required: true })}
      ${fieldInput({ label: 'Email', type: 'email', placeholder: 'you@email.com', required: true })}
    </div>
    ${fieldInput({ label: 'Event date', placeholder: 'e.g. Saturday, July 12' })}
    <div>
      <label class="field__label booking__occasion-label">Occasion</label>
      <div class="occasion-tags" id="occasion-tags">${occasionBtns}</div>
    </div>
    ${fieldTextarea({ label: 'Tell me about your vision', placeholder: 'Colours, theme, size of space…' })}
    <button type="submit" class="btn btn--primary btn--lg btn--full">Send my request</button>
  </form>`;
}

function confettiField() {
  const colors = ['#CC7585', '#E6CB8E', '#B7D2DD', '#AFC3AC', '#C9B6D6', '#F3CBA8'];
  let pieces = '';
  for (let i = 0; i < 32; i++) {
    const left = (i * 37) % 100;
    const c = colors[i % colors.length];
    const delay = ((i % 10) * 0.06).toFixed(2);
    const dur = (1.2 + (i % 5) * 0.22).toFixed(2);
    const rot = (i * 47) % 360;
    pieces += `<span class="confetti" style="left:${left}%;background:${c};animation-delay:${delay}s;animation-duration:${dur}s;--rot:${rot}deg"></span>`;
  }
  return `<div class="confetti-field" aria-hidden="true">${pieces}</div>`;
}

function footerHTML() {
  return `<footer class="site-footer">
    <div class="site-footer__inner">
      <div>
        <p class="site-footer__wordmark">Prettily <em>Popped</em></p>
        <p class="site-footer__tagline">Custom balloon decor &amp; event styling, handmade in Fredericton, New Brunswick.</p>
        <span class="site-footer__sign">&mdash; Erin</span>
      </div>
      <div>
        <p class="site-footer__col-head">Occasions</p>
        ${OCCASIONS.map(o => `<button class="site-footer__nav-link" data-scroll="scene-${o.key}">${o.name}</button>`).join('')}
      </div>
      <div>
        <p class="site-footer__col-head">Get in touch</p>
        <p class="site-footer__text">${BIZ.where}</p>
        <p class="site-footer__text">${BIZ.travel}</p>
        <p class="site-footer__text">${BIZ.email}</p>
      </div>
    </div>
    <div class="site-footer__copy">&copy; 2023&ndash;2026 Prettily Made Events &middot; Make your event pop</div>
  </footer>`;
}

function bookingFinale() {
  const infoRows = [
    ['Where', BIZ.where],
    ['Travel', BIZ.travel],
    ['Email', BIZ.email],
  ].map(([k, v]) => `<div class="booking__info-row">
      <span class="booking__info-key">${k}</span>
      <span class="booking__info-val">${v}</span>
    </div>`).join('');

  return `<section class="scene scene--booking" id="scene-booking" data-scene="booking">
    ${confettiField()}
    <div class="booking">
      <div class="booking__intro reveal">
        <span class="section-heading__eyebrow">Get in touch</span>
        <h2 class="booking__title">Let&rsquo;s make it <span class="booking__script">pop</span></h2>
        <p class="booking__lead">Tell me a little about your event and I&rsquo;ll get back to you within a day
          with ideas and a quote. No question is too big or too small!</p>
        <div class="booking__info">${infoRows}</div>
      </div>
      <div class="booking__card card card--pad-lg reveal" id="booking-card">${bookingFormHTML()}</div>
    </div>
    ${footerHTML()}
  </section>`;
}

/* ── Shell: top bar + progress rail ───────────────────────────────────────── */

function topBar() {
  return `<div class="topbar">
    <button class="topbar__logo" data-scroll="scene-hero">Prettily <em>Popped</em></button>
    <button class="btn btn--primary btn--sm" data-scroll="scene-booking">Book now</button>
  </div>`;
}

function progressRail() {
  const dots = OCCASIONS.map((o, i) => `
    <button class="rail__dot" data-target="scene-${o.key}" data-index="${i}" type="button" aria-label="${o.name}">
      <span class="rail__label">${o.name}</span>
    </button>`).join('');
  return `<nav class="rail" aria-label="Jump to an occasion">${dots}</nav>`;
}

/* ── Render ───────────────────────────────────────────────────────────────── */

function render() {
  document.getElementById('header-slot').innerHTML = topBar();
  document.getElementById('main').innerHTML =
    progressRail() +
    heroScene() +
    OCCASIONS.map(occasionScene).join('') +
    howItWorksScene() +
    bookingFinale();
}

/* ── Motion layer ─────────────────────────────────────────────────────────── */

const sceneTriggers = {};   // scene id → ScrollTrigger (for rail/anchor scrolling)
let motionMode = false;

function setActiveRail(index) {
  document.querySelectorAll('.rail__dot').forEach(dot => {
    dot.classList.toggle('is-active', Number(dot.dataset.index) === index);
  });
}

function buildHeroTimeline() {
  const scene = document.getElementById('scene-hero');
  const arch = scene.querySelector('.scene__arch-wrap');
  const content = scene.querySelector('.hero__content');
  const tl = gsap.timeline({
    scrollTrigger: {
      trigger: scene, start: 'top top', end: '+=120%',
      pin: true, scrub: 0.6, anticipatePin: 1,
      onToggle: self => { if (self.isActive) setActiveRail(-1); },
    },
  });
  tl.to(arch, { scale: 2.6, opacity: 0, ease: 'power2.in' }, 0)
    .to(content, { yPercent: -14, opacity: 0, ease: 'power1.in' }, 0);
  sceneTriggers['scene-hero'] = tl.scrollTrigger;
}

function buildOccasionTimeline(o, i) {
  const scene = document.getElementById('scene-' + o.key);
  const archWrap = scene.querySelector('.scene__arch-wrap');
  const content = scene.querySelector('.scene__content');
  const tents = scene.querySelectorAll('.tent');
  const tl = gsap.timeline({
    scrollTrigger: {
      trigger: scene, start: 'top top', end: '+=145%',
      pin: true, scrub: 0.6, anticipatePin: 1,
      onToggle: self => { if (self.isActive) setActiveRail(i); },
    },
  });
  tl.fromTo(archWrap, { scale: 0.62, opacity: 0, yPercent: 6 },
      { scale: 1, opacity: 1, yPercent: 0, ease: 'power2.out', duration: 0.32 }, 0)
    .fromTo(content, { xPercent: 48, opacity: 0 },
      { xPercent: 0, opacity: 1, ease: 'power3.out', duration: 0.34 }, 0.04)
    .fromTo(tents, { y: 64, opacity: 0 },
      { y: 0, opacity: 1, stagger: 0.05, ease: 'power2.out', duration: 0.3 }, 0.16)
    .to({}, { duration: 0.16 })                                                    // hold
    .to([content, archWrap], { xPercent: -46, opacity: 0, ease: 'power2.in', duration: 0.3 }, 0.76);
  sceneTriggers['scene-' + o.key] = tl.scrollTrigger;
}

function buildReveals() {
  gsap.utils.toArray('.reveal').forEach(el => {
    gsap.fromTo(el, { y: 50, opacity: 0 },
      { y: 0, opacity: 1, duration: 0.7, ease: 'power2.out',
        scrollTrigger: { trigger: el, start: 'top 84%' } });
  });
}

function setupConfetti() {
  const booking = document.getElementById('scene-booking');
  ScrollTrigger.create({
    trigger: booking, start: 'top 55%', once: true,
    onEnter: () => booking.classList.add('is-popped'),
  });
}

function revealOnView() {
  // Fallback (no GSAP): IntersectionObserver fade-up + confetti + active rail.
  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (!e.isIntersecting) return;
      e.target.classList.add('in-view');
      if (e.target.id === 'scene-booking') e.target.classList.add('is-popped');
      const idx = e.target.dataset.index;
      if (e.target.dataset.scene === 'occasion' && idx != null) setActiveRail(Number(idx));
      io.unobserve(e.target);
    });
  }, { threshold: 0.18 });

  document.querySelectorAll('.reveal, .scene[data-scene]').forEach(el => io.observe(el));
}

function initMotion() {
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const small = window.matchMedia('(max-width: 820px), (pointer: coarse)').matches;
  const hasGSAP = !!(window.gsap && window.ScrollTrigger);

  if (reduce) document.body.classList.add('no-float');

  if (!hasGSAP || reduce || small) {
    document.body.classList.add('static-mode');
    revealOnView();
    return;
  }

  motionMode = true;
  document.body.classList.add('motion-mode');
  gsap.registerPlugin(ScrollTrigger);

  buildHeroTimeline();
  OCCASIONS.forEach(buildOccasionTimeline);
  buildReveals();
  setupConfetti();

  ScrollTrigger.refresh();
}

/* ── Navigation / scrolling ───────────────────────────────────────────────── */

function scrollToScene(sceneId) {
  const el = document.getElementById(sceneId);
  if (!el) return;
  const trigger = sceneTriggers[sceneId];
  if (motionMode && trigger) {
    window.scrollTo({ top: trigger.start + 2, behavior: 'smooth' });
  } else {
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function updateOccasionTags() {
  const container = document.getElementById('occasion-tags');
  if (!container) return;
  container.querySelectorAll('[data-occasion]').forEach(btn => {
    const selected = btn.dataset.occasion === state.contactOccasion;
    btn.innerHTML = tag(btn.dataset.occasion, selected ? 'rose' : 'plum', selected);
  });
}

function rerenderBookingCard() {
  const card = document.getElementById('booking-card');
  if (card) card.innerHTML = bookingFormHTML();
  if (motionMode && window.ScrollTrigger) ScrollTrigger.refresh();
}

/* ── Event delegation ─────────────────────────────────────────────────────── */

document.addEventListener('click', (e) => {
  const scrollEl = e.target.closest('[data-scroll]');
  if (scrollEl) { scrollToScene(scrollEl.dataset.scroll); return; }

  const railEl = e.target.closest('[data-target]');
  if (railEl) { scrollToScene(railEl.dataset.target); return; }

  const planEl = e.target.closest('[data-plan]');
  if (planEl) {
    state.contactOccasion = planEl.dataset.plan;
    updateOccasionTags();
    scrollToScene('scene-booking');
    return;
  }

  const occasionEl = e.target.closest('[data-occasion]');
  if (occasionEl) {
    state.contactOccasion = occasionEl.dataset.occasion;
    updateOccasionTags();
    return;
  }

  const resetEl = e.target.closest('[data-action="reset-contact"]');
  if (resetEl) {
    state.contactSent = false;
    rerenderBookingCard();
    return;
  }
});

document.addEventListener('submit', (e) => {
  if (e.target.id === 'contact-form') {
    e.preventDefault();
    state.contactSent = true;
    rerenderBookingCard();
  }
});

/* ── Init ─────────────────────────────────────────────────────────────────── */

render();
initMotion();

  </script>
</body>
</html>
